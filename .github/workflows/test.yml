name: "Test"
on: push
permissions:
    contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ github.actor == 'dependabot[bot]' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        cache: npm
        node-version: 24.x
    - run: npm ci
    - run: npm test
